<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pautas das Reuniões — IPPenha</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e8e8ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    .wrap{max-width:820px;margin:0 auto;padding:32px 20px 60px}
    .header{display:flex;align-items:center;gap:14px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #2a2d3a}
    .header-ic{width:36px;height:36px;background:rgba(42,181,192,.15);border:1.5px solid rgba(42,181,192,.35);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#2ab5c0;flex-shrink:0}
    .header-lbl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
    .header-ttl{font-size:20px;font-weight:700;color:#e8e8ee}
    .card{background:#161922;border:1px solid #2a2d3a;border-radius:10px;margin-bottom:12px;overflow:hidden}
    .card-hdr{padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;transition:background .12s}
    .card-hdr:hover{background:#1c2030}
    .card-info{flex:1}
    .card-ttl{font-size:13px;font-weight:700;color:#e8e8ee}
    .card-sub{font-size:11px;color:#555;margin-top:2px}
    .card-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .badge{font-size:10px;padding:2px 8px;border-radius:8px;white-space:nowrap}
    .chev{color:#444;font-size:14px;transition:transform .2s}
    .card-body{display:none;padding:0 18px 14px;border-top:1px solid #1e2130}
    .card-body.open{display:block}
    .chev.open{transform:rotate(90deg)}
    .pauta-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #1a1d28}
    .pauta-item:last-child{border-bottom:none}
    .pauta-info{flex:1;min-width:0}
    .pauta-ttl{font-size:13px;font-weight:600;color:#e8e8ee}
    .pauta-dsc{font-size:11.5px;color:#666;margin-top:3px}
    .pauta-cat{font-size:10px;color:#444;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
    .empty{color:#444;font-size:12px;padding:14px 0}
    .obs{font-size:12px;color:#555;padding:10px 0;border-bottom:1px solid #1a1d28;font-style:italic}
    #status{color:#555;font-size:13px;padding:40px 0;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-ic">◆</div>
      <div>
        <div class="header-lbl">IPPenha · Conselho e Governança</div>
        <div class="header-ttl">Pautas das Reuniões</div>
      </div>
    </div>
    <div id="content"><div id="status">Carregando reuniões...</div></div>
  </div>

  <script>
    const SUPA_URL = "https://erhwryfzpycahgsohhbh.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyaHdyeWZ6cHljYWhnc29oaGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjg2MTUsImV4cCI6MjA5MTg0NDYxNX0.T0hp90Bmufj6a3oUPq1vYcLiGx9YjyMaZiE38S0e3_8";

    const TIPO = { ORDINARIA:"Ordinária", EXTRAORDINARIA:"Extraordinária", COMISSAO_EXECUTIVA:"Comissão Executiva" };
    const STATUS_R = { REALIZADA:["Realizada","#3aaa5c"], CANCELADA:["Cancelada","#e05555"], AGENDADA:["Agendada","#4a9cf5"] };
    const STATUS_P = {
      PENDENTE:  ["Pendente","#888"],   EM_ANALISE:["Em análise","#d4a843"],
      APROVADO:  ["Aprovado","#3aaa5c"],REJEITADO: ["Rejeitado","#e05555"],
      ADIADO:    ["Adiado","#4a9cf5"], CONCLUIDO: ["Concluído","#8b6fd4"],
    };

    function fmt(d){ if(!d) return "—"; const[y,m,day]=d.split("T")[0].split("-"); return `${day}/${m}/${y}`; }

    async function api(path){
      const r = await fetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    function toggle(i){
      document.getElementById("b"+i).classList.toggle("open");
      document.getElementById("c"+i).classList.toggle("open");
    }

    async function render(){
      const el = document.getElementById("content");
      try{
        const [reunioes, pautas] = await Promise.all([
          api("conselho_reunioes?select=*&order=data_reuniao.desc&limit=100"),
          api("conselho_pautas?select=*&order=ordem.asc,created_at.asc&limit=1000"),
        ]);

        if(!reunioes.length){ el.innerHTML='<div id="status">Nenhuma reunião registrada.</div>'; return; }

        const por = {};
        pautas.forEach(p=>{ if(!por[p.reuniao_id]) por[p.reuniao_id]=[]; por[p.reuniao_id].push(p); });

        el.innerHTML = reunioes.map((r,i)=>{
          const tipo = TIPO[r.tipo] || r.tipo || "Reunião";
          const [sLabel, sCor] = STATUS_R[r.status] || ["—","#888"];
          const itens = por[r.id] || [];

          const pautasHtml = itens.length ? itens.map(p=>{
            const [pLabel,pCor] = STATUS_P[p.status] || [p.status||"—","#888"];
            return `<div class="pauta-item">
              <div class="pauta-info">
                <div class="pauta-ttl">${p.titulo||"—"}</div>
                ${p.descricao?`<div class="pauta-dsc">${p.descricao}</div>`:""}
                ${p.categoria?`<div class="pauta-cat">${p.categoria}</div>`:""}
              </div>
              <span class="badge" style="color:${pCor};background:${pCor}18;border:1px solid ${pCor}44">${pLabel}</span>
            </div>`;
          }).join("") : `<div class="empty">Nenhum item de pauta registrado.</div>`;

          return `<div class="card">
            <div class="card-hdr" onclick="toggle(${i})">
              <div class="card-info">
                <div class="card-ttl">${tipo} · ${fmt(r.data_reuniao)}</div>
                ${r.local?`<div class="card-sub">${r.local}</div>`:""}
              </div>
              <div class="card-meta">
                <span class="badge" style="color:${sCor};background:${sCor}18;border:1px solid ${sCor}44">${sLabel}</span>
                <span style="font-size:10px;color:#444">${itens.length} item${itens.length!==1?"s":""}</span>
                <span class="chev" id="c${i}">›</span>
              </div>
            </div>
            <div class="card-body" id="b${i}">
              ${r.observacoes?`<div class="obs">${r.observacoes}</div>`:""}
              ${pautasHtml}
            </div>
          </div>`;
        }).join("");
      }catch(e){
        el.innerHTML=`<div id="status" style="color:#e05555">Erro ao carregar dados: ${e.message}</div>`;
      }
    }

    render();
  </script>
</body>
</html>

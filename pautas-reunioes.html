<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pautas das Reuniões — IPPenha</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0f14;color:#e0e0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;line-height:1.5}
    .wrap{max-width:760px;margin:0 auto;padding:40px 20px 80px}

    /* Header */
    .header{display:flex;align-items:center;gap:16px;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid #1e2130}
    .header-ic{width:42px;height:42px;background:rgba(42,181,192,.12);border:1.5px solid rgba(42,181,192,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#2ab5c0;flex-shrink:0}
    .header-lbl{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
    .header-ttl{font-size:22px;font-weight:700;color:#e8e8ee}

    /* Reunião card */
    .card{background:#13161e;border:1px solid #1e2130;border-radius:12px;margin-bottom:16px;overflow:hidden}
    .card-hdr{padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;transition:background .15s}
    .card-hdr:hover{background:#181c26}
    .card-info{flex:1}
    .card-ttl{font-size:15px;font-weight:700;color:#e8e8ee;letter-spacing:-.01em}
    .card-sub{font-size:12px;color:#444;margin-top:3px}
    .card-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .badge{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
    .chev{color:#333;font-size:18px;transition:transform .2s;line-height:1}
    .chev.open{transform:rotate(90deg)}

    /* Body */
    .card-body{display:none;border-top:1px solid #1a1d28}
    .card-body.open{display:block}
    .obs{font-size:12.5px;color:#555;padding:14px 20px;border-bottom:1px solid #1a1d28;font-style:italic;background:#0f1117}

    /* Pauta items */
    .pauta-list{padding:8px 0}
    .pauta-item{padding:18px 20px;border-bottom:1px solid #191c28;display:flex;align-items:flex-start;gap:16px}
    .pauta-item:last-child{border-bottom:none}
    .pauta-num{font-size:11px;font-weight:700;color:#2a2d3a;min-width:22px;padding-top:2px;text-align:right;flex-shrink:0}
    .pauta-info{flex:1;min-width:0}
    .pauta-ttl{font-size:14px;font-weight:700;color:#dde0ea;margin-bottom:6px}
    .pauta-dsc{font-size:13px;color:#6b7082;line-height:1.65}
    .pauta-sintese{font-size:13px;color:#7a8090;margin-top:10px;padding:10px 14px;border-left:2px solid #252835;line-height:1.65;background:#0f1218;border-radius:0 6px 6px 0}
    .pauta-delib{font-size:13px;color:#3aaa5c;margin-top:10px;padding:12px 14px;background:rgba(58,170,92,.06);border:1px solid rgba(58,170,92,.18);border-radius:8px;line-height:1.65}
    .pauta-delib-lbl{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#3aaa5c;opacity:.6;margin-bottom:5px}
    .pauta-footer{display:flex;align-items:center;gap:10px;margin-top:10px}
    .pauta-cat{font-size:10px;color:#333;text-transform:uppercase;letter-spacing:.08em}
    .empty{color:#333;font-size:12.5px;padding:24px 20px}
    #status{color:#444;font-size:13px;padding:60px 0;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-ic">◆</div>
      <div>
        <div class="header-lbl">IPPenha · Conselho e Governança</div>
        <div class="header-ttl">Pautas das Reuniões</div>
      </div>
    </div>
    <div id="content"><div id="status">Carregando reuniões...</div></div>
  </div>

  <script>
    const SUPA_URL = "https://erhwryfzpycahgsohhbh.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyaHdyeWZ6cHljYWhnc29oaGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjg2MTUsImV4cCI6MjA5MTg0NDYxNX0.T0hp90Bmufj6a3oUPq1vYcLiGx9YjyMaZiE38S0e3_8";

    const TIPO = { ORDINARIA:"Ordinária", EXTRAORDINARIA:"Extraordinária", COMISSAO_EXECUTIVA:"Comissão Executiva" };
    const STATUS_R = { REALIZADA:["Realizada","#3aaa5c"], CANCELADA:["Cancelada","#e05555"], AGENDADA:["Agendada","#4a9cf5"] };
    const STATUS_P = {
      PENDENTE:  ["Pendente","#666"],   EM_ANALISE:["Em análise","#d4a843"],
      APROVADO:  ["Aprovado","#3aaa5c"],REJEITADO: ["Rejeitado","#e05555"],
      ADIADO:    ["Adiado","#4a9cf5"], CONCLUIDO: ["Concluído","#8b6fd4"],
    };

    function fmt(d){ if(!d) return "—"; const[y,m,day]=d.split("T")[0].split("-"); return `${day}/${m}/${y}`; }

    async function api(path){
      const r = await fetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    function toggle(i){
      document.getElementById("b"+i).classList.toggle("open");
      document.getElementById("c"+i).classList.toggle("open");
    }

    async function render(){
      const el = document.getElementById("content");
      try{
        const [reunioes, pautas] = await Promise.all([
          api("conselho_reunioes?select=*&order=data_reuniao.desc&limit=100"),
          api("conselho_pautas?select=*&order=ordem.asc,created_at.asc&limit=1000"),
        ]);

        if(!reunioes.length){ el.innerHTML='<div id="status">Nenhuma reunião registrada.</div>'; return; }

        const por = {};
        pautas.forEach(p=>{ if(!por[p.reuniao_id]) por[p.reuniao_id]=[]; por[p.reuniao_id].push(p); });

        el.innerHTML = reunioes.map((r,i)=>{
          const tipo = TIPO[r.tipo] || r.tipo || "Reunião";
          const [sLabel, sCor] = STATUS_R[r.status] || ["—","#666"];
          const itens = por[r.id] || [];

          const pautasHtml = itens.length
            ? `<div class="pauta-list">${itens.map((p,n)=>{
                const [pLabel,pCor] = STATUS_P[p.status] || [p.status||"—","#666"];
                return `<div class="pauta-item">
                  <div class="pauta-num">${n+1}</div>
                  <div class="pauta-info">
                    <div class="pauta-ttl">${p.titulo||"—"}</div>
                    ${p.descricao?`<div class="pauta-dsc">${p.descricao}</div>`:""}
                    ${p.sintese?`<div class="pauta-sintese">${p.sintese}</div>`:""}
                    ${p.deliberacao?`<div class="pauta-delib"><span class="pauta-delib-lbl">Deliberação</span>${p.deliberacao}</div>`:""}
                    <div class="pauta-footer">
                      <span class="badge" style="color:${pCor};background:${pCor}18;border:1px solid ${pCor}33">${pLabel}</span>
                      ${p.categoria?`<span class="pauta-cat">${p.categoria}</span>`:""}
                    </div>
                  </div>
                </div>`;
              }).join("")}</div>`
            : `<div class="empty">Nenhum item de pauta registrado.</div>`;

          return `<div class="card">
            <div class="card-hdr" onclick="toggle(${i})">
              <div class="card-info">
                <div class="card-ttl">${tipo} · ${fmt(r.data_reuniao)}</div>
                ${r.local?`<div class="card-sub">${r.local}</div>`:""}
              </div>
              <div class="card-meta">
                <span class="badge" style="color:${sCor};background:${sCor}18;border:1px solid ${sCor}33">${sLabel}</span>
                <span style="font-size:11px;color:#333">${itens.length} item${itens.length!==1?"s":""}</span>
                <span class="chev" id="c${i}">›</span>
              </div>
            </div>
            <div class="card-body" id="b${i}">
              ${r.observacoes?`<div class="obs">${r.observacoes}</div>`:""}
              ${pautasHtml}
            </div>
          </div>`;
        }).join("");
      }catch(e){
        el.innerHTML=`<div id="status" style="color:#e05555">Erro ao carregar dados: ${e.message}</div>`;
      }
    }

    render();
  </script>
</body>
</html>

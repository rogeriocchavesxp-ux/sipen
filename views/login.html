<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="icons/logo-sipen-dark.png" alt="SIPEN" class="login-logo-img logo-dark-only">
      <img src="icons/logo-sipen-light.png" alt="SIPEN" class="login-logo-img logo-light-only">
    </div>
    <div class="login-field">
      <label>E-mail</label>
      <input type="text" id="login-email" placeholder="seu@email.com ou nome" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar no SIPEN</button>
    <div class="login-err" id="login-err"></div>
    <button onclick="esqueceuSenha()" style="background:none;border:none;color:var(--tx3);font-size:11px;cursor:pointer;margin-top:4px;text-decoration:underline">Esqueceu a senha?</button>
    <div class="login-ver">IPPenha · Penha · SP — Gestão de Acessos v6.30.66</div>
  </div>
  <!-- Rodapé 70 Anos IPPenha -->
  <footer class="sipen-footer sipen-footer-login" aria-label="IPPenha 70 Anos">
    <div class="sfb-inner">
      <div class="sfb-badge">
        <span class="sfb-badge-num">70</span>
        <span class="sfb-badge-anos">Anos</span>
      </div>
      <div class="sfb-sep"></div>
      <div class="sfb-church">
        <img src="icons/logo-ippenha.svg" class="sfb-logo" alt="IPPenha">
      </div>
      <div class="sfb-sep"></div>
      <p class="sfb-verse">A igreja, na verdade tinha paz, edificando-se e caminhando no temor do SENHOR, crescia em número.&nbsp;&nbsp;<em>Atos 9:31</em></p>
      <div class="sfb-sep"></div>
      <div class="sfb-desde">
        <span class="sfb-desde-lbl">Desde</span>
        <span class="sfb-desde-ano">1956</span>
      </div>
    </div>
  </footer>
</div>

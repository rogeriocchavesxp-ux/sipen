<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="ls">SIPEN</div>
      <div class="lc">Sistema Integrado da IPPenha · v6.30.48</div>
    </div>
    <div class="login-field">
      <label>E-mail</label>
      <input type="text" id="login-email" placeholder="seu@email.com ou nome" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar no SIPEN</button>
    <div class="login-err" id="login-err"></div>
    <button onclick="esqueceuSenha()" style="background:none;border:none;color:var(--tx3);font-size:11px;cursor:pointer;margin-top:4px;text-decoration:underline">Esqueceu a senha?</button>
    <div class="login-ver">IPPenha · Penha · SP — Gestão de Acessos v6.30.48</div>
  </div>
</div>

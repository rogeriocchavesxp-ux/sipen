<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIPEN — Importar Agenda 2026</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#181b1e;color:#d8dce1;min-height:100vh;padding:32px 20px}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#5a6068;margin-bottom:28px}
.card{background:#2b2f33;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:24px;max-width:680px;margin:0 auto 20px}
label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#8a9099;display:block;margin-bottom:8px}
input[type=file]{width:100%;background:#212529;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#d8dce1;padding:10px;font-size:13px;cursor:pointer}
button{background:#2ab5c0;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;padding:11px 24px;cursor:pointer;width:100%;margin-top:16px}
button:disabled{background:#3a3f45;color:#5a6068;cursor:not-allowed}
button:hover:not(:disabled){background:#36c4d0}
#log{font-family:monospace;font-size:11.5px;background:#161819;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:16px;height:320px;overflow-y:auto;white-space:pre-wrap;margin-top:16px;display:none}
.ok{color:#3aaa5c}.err{color:#e05555}.warn{color:#d4a843}.info{color:#4a9cf5}
.prog{background:#212529;border-radius:6px;height:8px;margin-top:12px;overflow:hidden;display:none}
.prog-bar{height:100%;background:#2ab5c0;width:0%;transition:width .3s}
.stat{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.st{background:#212529;border-radius:6px;padding:14px;text-align:center}
.st-n{font-size:22px;font-weight:700;color:#2ab5c0}
.st-l{font-size:10px;color:#5a6068;margin-top:3px}
</style>
</head>
<body>

<div class="card">
  <h1>📅 Importar Agenda IPPenha 2026</h1>
  <p class="sub">Lê o arquivo Excel e insere os eventos na tabela <code>agenda</code> do Supabase</p>

  <label>Arquivo Excel (.xlsx)</label>
  <input type="file" id="file" accept=".xlsx,.xls">

  <button id="btn" onclick="importar()" disabled>Selecione o arquivo acima</button>

  <div class="prog" id="prog"><div class="prog-bar" id="prog-bar"></div></div>

  <div class="stat" id="stat" style="display:none">
    <div class="st"><div class="st-n" id="st-lidos">0</div><div class="st-l">Lidos</div></div>
    <div class="st"><div class="st-n ok" id="st-ok">0</div><div class="st-l">Inseridos</div></div>
    <div class="st"><div class="st-n err" id="st-err">0</div><div class="st-l">Erros</div></div>
  </div>

  <div id="log"></div>
</div>

<script>
const SUPABASE_URL = "https://erhwryfzpycahgsohhbh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyaHdyeWZ6cHljYWhnc29oaGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjg2MTUsImV4cCI6MjA5MTg0NDYxNX0.T0hp90Bmufj6a3oUPq1vYcLiGx9YjyMaZiE38S0e3_8";

const ABAS_MENSAIS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
  "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

const MES_NUM = {Janeiro:1,Fevereiro:2,"Março":3,Abril:4,Maio:5,Junho:6,
  Julho:7,Agosto:8,Setembro:9,Outubro:10,Novembro:11,Dezembro:12};

let cLidos=0, cOk=0, cErr=0;

function pad(n){return String(n).padStart(2,"0")}

function log(msg, cls=""){
  const el = document.getElementById("log");
  el.style.display = "block";
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function setProgresso(pct){
  document.getElementById("prog").style.display="block";
  document.getElementById("prog-bar").style.width=pct+"%";
}

function atualizarStats(){
  document.getElementById("stat").style.display="grid";
  document.getElementById("st-lidos").textContent = cLidos;
  document.getElementById("st-ok").textContent    = cOk;
  document.getElementById("st-err").textContent   = cErr;
}

document.getElementById("file").addEventListener("change", function(){
  const btn = document.getElementById("btn");
  if (this.files.length > 0){
    btn.disabled = false;
    btn.textContent = "▶ Iniciar Importação";
  } else {
    btn.disabled = true;
    btn.textContent = "Selecione o arquivo acima";
  }
});

function excelTimeToStr(val){
  if (val === null || val === undefined || val === "") return null;
  if (typeof val === "string"){
    const m = val.match(/^(\d{1,2}):(\d{2})/);
    return m ? `${pad(m[1])}:${pad(m[2])}` : null;
  }
  if (typeof val === "number"){
    const totalMin = Math.round(val * 24 * 60);
    return `${pad(Math.floor(totalMin/60))}:${pad(totalMin%60)}`;
  }
  return null;
}

function montarData(mes, dia){
  if (!dia) return null;
  const d = parseInt(dia, 10);
  if (isNaN(d) || d < 1 || d > 31) return null;
  return `2026-${pad(MES_NUM[mes])}-${pad(d)}`;
}

function parsearData(val, mes){
  if (!val) return null;
  // Serial numérico do Excel (data completa)
  if (typeof val === "number" && val > 1000){
    const d = XLSX.SSF.parse_date_code(val);
    if (d) return `${d.y}-${pad(d.m)}-${pad(d.d)}`;
  }
  // Número simples = dia do mês
  return montarData(mes, val);
}

function txt(v){
  if (v===null||v===undefined) return null;
  const s = String(v).trim();
  return s===""?null:s;
}

function parsearAba(ws, nomeMes){
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  if (!rows.length) return [];

  // Detectar linha de cabeçalho
  let hRow = 2; // padrão linha 3 (índice 2)
  for (let i = 0; i < Math.min(8, rows.length); i++){
    const r = rows[i] || [];
    const vals = r.map(v => String(v||"").toLowerCase());
    if (vals.some(v => v.includes("evento"))){hRow = i; break;}
  }

  const headers = (rows[hRow]||[]).map(v => String(v||"").toLowerCase().trim());

  // Detectar colunas
  function findCol(terms){
    for (const t of terms){
      const i = headers.findIndex(h => h.includes(t));
      if (i >= 0) return i;
    }
    return -1;
  }

  const col = {
    evento:      findCol(["evento"]),
    diaMes:      findCol(["dia do mês","dia do mes"]),
    diaSemana:   findCol(["dia da semana"]),
    semana:      findCol(["semana"]),
    horaInicio:  findCol(["hora iní","hora ini","início","inicio","hora i"]),
    horaFim:     findCol(["hora fim","fim"]),
    recorrencia: findCol(["recorr"]),
    observ:      findCol(["obs"]),
    espaco:      findCol(["espaço","espaco","local","ambiente"]),
    organizador: findCol(["organiz","responsav","ministr"]),
  };

  // Fallbacks por posição se não achou cabeçalho
  if (col.evento     < 0) col.evento     = 3;
  if (col.diaMes     < 0) col.diaMes     = 2;
  if (col.diaSemana  < 0) col.diaSemana  = 1;
  if (col.horaInicio < 0) col.horaInicio = 4;
  if (col.horaFim    < 0) col.horaFim    = 5;

  const eventos = [];

  for (let i = hRow + 1; i < rows.length; i++){
    const row = rows[i];
    if (!row || row.every(v => v===null||v==="")) continue;

    const titulo = txt(row[col.evento]);
    if (!titulo) continue;

    // Ignorar linhas que são cabeçalhos repetidos
    const tl = titulo.toLowerCase();
    if (tl==="evento"||tl.startsWith("atividade")||tl==="título"||tl==="titulo") continue;

    const data = parsearData(row[col.diaMes], nomeMes);
    if (!data){
      log(`  linha ${i+1}: "${titulo}" — sem data, pulando`, "warn");
      continue;
    }

    eventos.push({
      titulo,
      data,
      mes:         nomeMes,
      dia_semana:  txt(row[col.diaSemana]),
      hora_inicio: excelTimeToStr(row[col.horaInicio]),
      hora_fim:    excelTimeToStr(row[col.horaFim]),
      recorrencia: col.recorrencia >= 0 ? txt(row[col.recorrencia]) : null,
      espaco:      col.espaco >= 0 ? txt(row[col.espaco]) : null,
      organizador: col.organizador >= 0 ? txt(row[col.organizador]) : null,
      observacao:  col.observ >= 0 ? txt(row[col.observ]) : null,
      status:      "confirmado",
    });
  }

  return eventos;
}

async function inserirLote(lote){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/agenda`, {
    method: "POST",
    headers: {
      "apikey":        SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type":  "application/json",
      "Prefer":        "resolution=ignore-duplicates,return=minimal"
    },
    body: JSON.stringify(lote)
  });
  if (!res.ok){
    const err = await res.text();
    throw new Error(`HTTP ${res.status}: ${err}`);
  }
}

async function importar(){
  const fileInput = document.getElementById("file");
  if (!fileInput.files.length){ alert("Selecione o arquivo Excel"); return; }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Importando…";
  cLidos = cOk = cErr = 0;

  document.getElementById("log").innerHTML = "";
  log("Lendo arquivo...", "info");

  const buf = await fileInput.files[0].arrayBuffer();
  const wb  = XLSX.read(buf, {type:"array", raw:true});

  log(`Abas encontradas: ${wb.SheetNames.join(", ")}`, "info");
  log("─────────────────────────────────────────");

  const totalAbas = ABAS_MENSAIS.length;

  for (let ai = 0; ai < ABAS_MENSAIS.length; ai++){
    const mes = ABAS_MENSAIS[ai];

    // Encontrar aba por nome (com tolerância a acentos)
    const abaReal = wb.SheetNames.find(n => {
      const a = n.trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
      const b = mes.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
      return a === b;
    });

    if (!abaReal){
      log(`⚠  "${mes}" — aba não encontrada, pulando`, "warn");
      continue;
    }

    log(`\n📅 ${mes}...`);
    const eventos = parsearAba(wb.Sheets[abaReal], mes);
    log(`   ${eventos.length} eventos lidos`);
    cLidos += eventos.length;

    // Inserir em lotes de 50
    const LOTE = 50;
    for (let i = 0; i < eventos.length; i += LOTE){
      const lote = eventos.slice(i, i + LOTE);
      try {
        await inserirLote(lote);
        cOk += lote.length;
      } catch(e){
        log(`   ❌ Erro: ${e.message}`, "err");
        cErr += lote.length;
      }
      atualizarStats();
    }

    setProgresso(Math.round((ai+1)/totalAbas*100));
    log(`   ✅ ${mes} concluído`, "ok");
  }

  log("\n═══════════════════════════════════════════", "info");
  log(`✅ Importação finalizada`, "ok");
  log(`   Lidos:    ${cLidos}`, "info");
  log(`   OK:       ${cOk}`, "ok");
  log(`   Erros:    ${cErr}`, cErr > 0 ? "err" : "info");

  btn.textContent = "✅ Concluído";
  atualizarStats();
}
</script>
</body>
</html>

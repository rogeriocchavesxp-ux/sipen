<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrição — IPPenha</title>
<link rel="icon" type="image/png" sizes="32x32" href="/sipen/icons/icon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:    #4a9cf5;
    --gr:     #3aaa5c;
    --rose:   #e05555;
    --amber:  #d09040;
    --tx1:    #1a1d21;
    --tx2:    #4a5260;
    --tx3:    #8a919e;
    --bg:     #f4f6f9;
    --card:   #ffffff;
    --bd:     #e2e6ec;
    --inp:    #f8fafc;
    --inpbd:  #cdd3da;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --tx1: #e8eaed; --tx2: #9aa0ac; --tx3: #5c6370;
      --bg: #12151a; --card: #1e2128; --bd: #2c3040; --inp: #272b34; --inpbd: #3a4050;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', system-ui, sans-serif; background: var(--bg); color: var(--tx1); min-height: 100vh; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header da página */
  .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--bd); }
  .page-logo { width: 32px; height: 32px; object-fit: contain; }
  .page-brand { font-size: 12px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .1em; }

  /* Card do evento */
  .event-card { background: var(--card); border: 1px solid var(--bd); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .event-badge { font-size: 10px; font-weight: 700; color: var(--sky); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .event-title { font-size: 22px; font-weight: 800; color: var(--tx1); line-height: 1.25; margin-bottom: 12px; }
  .event-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12.5px; color: var(--tx2); margin-bottom: 12px; }
  .event-meta span { display: flex; align-items: center; gap: 5px; }
  .event-desc { font-size: 13px; color: var(--tx2); line-height: 1.55; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--bd); white-space: pre-wrap; }
  .event-vagas { margin-top: 12px; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .event-vagas.ok  { background: rgba(58,170,92,.1); color: var(--gr); border: 1px solid rgba(58,170,92,.25); }
  .event-vagas.low { background: rgba(208,144,64,.1); color: var(--amber); border: 1px solid rgba(208,144,64,.25); }
  .event-valor { margin-top: 10px; padding: 8px 12px; border-radius: 8px; background: rgba(74,156,245,.08); border: 1px solid rgba(74,156,245,.2); font-size: 13px; font-weight: 700; color: var(--sky); }

  /* Estados de bloqueio */
  .state-block { background: var(--card); border: 1px solid var(--bd); border-radius: 14px; padding: 32px 24px; text-align: center; }
  .state-block .icon { font-size: 40px; margin-bottom: 12px; }
  .state-block h2 { font-size: 17px; font-weight: 700; color: var(--tx1); margin-bottom: 8px; }
  .state-block p  { font-size: 13px; color: var(--tx2); line-height: 1.5; }

  /* Formulário */
  .form-card { background: var(--card); border: 1px solid var(--bd); border-radius: 14px; padding: 22px 24px; }
  .form-title { font-size: 14px; font-weight: 700; color: var(--tx1); margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--bd); }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 10px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .07em; }
  .field input, .field select, .field textarea {
    padding: 10px 12px; border-radius: 8px; border: 1px solid var(--inpbd);
    background: var(--inp); color: var(--tx1); font-size: 13.5px; font-family: inherit;
    outline: none; width: 100%; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--sky); }
  .field textarea { resize: vertical; }
  .req { color: var(--rose); margin-left: 2px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 400px) { .row2 { grid-template-columns: 1fr; } }

  .resp-sec { display: none; }
  .resp-sec.show { display: block; }

  .btn-submit {
    width: 100%; padding: 13px; border-radius: 9px; border: none;
    background: var(--sky); color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 8px; transition: opacity .15s;
  }
  .btn-submit:hover { opacity: .9; }
  .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

  /* Sucesso */
  .success-card { background: var(--card); border: 1px solid rgba(58,170,92,.4); border-radius: 14px; padding: 32px 24px; text-align: center; }
  .success-card .icon { font-size: 44px; margin-bottom: 12px; }
  .success-card h2 { font-size: 18px; font-weight: 800; color: var(--gr); margin-bottom: 8px; }
  .success-card p  { font-size: 13px; color: var(--tx2); line-height: 1.5; }
  .success-name { font-weight: 700; color: var(--tx1); }

  /* Footer */
  .footer { margin-top: 32px; text-align: center; font-size: 11px; color: var(--tx3); }

  /* Loading */
  .loader { text-align: center; padding: 60px 24px; color: var(--tx3); }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--bd); border-top-color: var(--sky); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <img src="/icons/logo-sipen-light.png" class="page-logo" alt="SIPEN" onerror="this.style.display='none'">
    <span class="page-brand">Igreja Presbiteriana da Penha</span>
  </div>

  <div id="app">
    <div class="loader">
      <div class="spinner"></div>
      <div style="font-size:13px">Carregando evento...</div>
    </div>
  </div>

  <div class="footer">
    Sistema SIPEN · Igreja Presbiteriana da Penha
  </div>

</div>

<script>
/* ── Configuração ──────────────────────────────────── */
const SB_URL = "https://erhwryfzpycahgsohhbh.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyaHdyeWZ6cHljYWhnc29oaGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjg2MTUsImV4cCI6MjA5MTg0NDYxNX0.T0hp90Bmufj6a3oUPq1vYcLiGx9YjyMaZiE38S0e3_8";
const HDRS   = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" };

/* ── Utilitários ───────────────────────────────────── */
function eh(v) {
  return String(v ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function fmtD(d) {
  if (!d) return "—";
  const [y, m, dia] = String(d).slice(0, 10).split("-");
  return `${dia}/${m}/${y}`;
}
function fmtH(h) { return h ? String(h).slice(0, 5) : ""; }
function fmtMoeda(v) {
  return "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}
async function sbGet(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: HDRS });
  if (!r.ok) throw new Error(await r.text().catch(() => `HTTP ${r.status}`));
  return r.json();
}
async function sbPost(path, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method: "POST",
    headers: { ...HDRS, "Prefer": "return=representation" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text().catch(() => `HTTP ${r.status}`));
  return r.json();
}

/* ── Main ──────────────────────────────────────────── */
const app = document.getElementById("app");
const params = new URLSearchParams(location.search);
const eventoId = params.get("id") || params.get("evento");

if (!eventoId) {
  renderErro("Link inválido", "Este link não contém o identificador do evento. Solicite um novo link ao organizador.");
} else {
  init(eventoId);
}

async function init(id) {
  try {
    const [evRes, inscrRes] = await Promise.all([
      sbGet(`eventos?id=eq.${id}&select=*&limit=1`),
      sbGet(`evento_inscricoes?evento_id=eq.${id}&select=id&limit=2000`),
    ]);
    const evt = Array.isArray(evRes) ? evRes[0] : null;
    if (!evt) { renderErro("Evento não encontrado", "Este link pode estar desatualizado ou o evento foi removido."); return; }
    const totalInscritos = Array.isArray(inscrRes) ? inscrRes.length : 0;
    renderEvento(evt, totalInscritos);
  } catch (e) {
    renderErro("Erro ao carregar", e.message || "Tente novamente em alguns instantes.");
  }
}

function renderEvento(evt, totalInscritos) {
  const hoje = new Date().toISOString().slice(0, 10);
  const prazoVencido = evt.prazo_inscricao && evt.prazo_inscricao < hoje;
  const vagasEsgotadas = evt.vagas && totalInscritos >= evt.vagas;
  const statusFechado = ["inscricoes_encerradas", "em_andamento", "concluido", "cancelado"].includes(evt.status);
  const podeInscrever = !prazoVencido && !vagasEsgotadas && !statusFechado;

  const metaHtml = [
    evt.data_inicio ? `<span>📅 ${fmtD(evt.data_inicio)}${evt.hora_inicio ? " · " + fmtH(evt.hora_inicio) : ""}</span>` : "",
    evt.data_fim    ? `<span>🔚 Até ${fmtD(evt.data_fim)}</span>` : "",
    evt.local_nome  ? `<span>📍 ${eh(evt.local_nome)}</span>` : "",
    evt.ministerio_organizador ? `<span>🏛 ${eh(evt.ministerio_organizador)}</span>` : "",
    evt.prazo_inscricao ? `<span>⏰ Inscrições até ${fmtD(evt.prazo_inscricao)}</span>` : "",
  ].filter(Boolean).join("");

  const vagasRestantes = evt.vagas ? evt.vagas - totalInscritos : null;
  const vagasHtml = evt.vagas
    ? `<div class="event-vagas ${vagasRestantes <= 5 ? "low" : "ok"}">
        ${vagasEsgotadas
          ? "Vagas esgotadas"
          : `${vagasRestantes} vaga${vagasRestantes !== 1 ? "s" : ""} disponível${vagasRestantes !== 1 ? "s" : ""} · ${totalInscritos} inscrito${totalInscritos !== 1 ? "s" : ""}`}
       </div>`
    : `<div style="font-size:11.5px;color:var(--tx3);margin-top:8px">${totalInscritos} inscrito${totalInscritos !== 1 ? "s" : ""}</div>`;

  const valorHtml = !evt.gratuito && evt.valor
    ? `<div class="event-valor">💰 ${fmtMoeda(evt.valor)} por pessoa</div>`
    : "";

  const publicoHtml = (evt.publico_alvo || []).length
    ? `<div style="margin-top:10px;font-size:11.5px;color:var(--tx3)">Público: ${evt.publico_alvo.join(", ")}</div>`
    : "";

  let estadoHtml = "";
  if (statusFechado) {
    const msgs = {
      inscricoes_encerradas: ["🔒", "Inscrições encerradas", "O prazo para inscrições neste evento foi encerrado."],
      em_andamento:          ["🎉", "Evento em andamento",   "Este evento já está acontecendo."],
      concluido:             ["✅", "Evento concluído",      "Este evento já foi realizado."],
      cancelado:             ["❌", "Evento cancelado",      "Este evento foi cancelado."],
    };
    const [ico, ttl, desc] = msgs[evt.status] || ["🔒","Encerrado","Este evento não está mais aceitando inscrições."];
    estadoHtml = `<div class="state-block"><div class="icon">${ico}</div><h2>${ttl}</h2><p>${desc}</p></div>`;
  } else if (prazoVencido) {
    estadoHtml = `<div class="state-block"><div class="icon">⏰</div><h2>Prazo encerrado</h2><p>O prazo para inscrições neste evento (${fmtD(evt.prazo_inscricao)}) já passou.</p></div>`;
  } else if (vagasEsgotadas) {
    estadoHtml = `<div class="state-block"><div class="icon">😔</div><h2>Vagas esgotadas</h2><p>Todas as ${evt.vagas} vagas já foram preenchidas. Entre em contato com os organizadores para verificar disponibilidade.</p></div>`;
  }

  document.title = `Inscrição — ${evt.titulo} · IPPenha`;

  app.innerHTML = `
    <div class="event-card">
      <div class="event-badge">Inscrição de Evento</div>
      <div class="event-title">${eh(evt.titulo)}</div>
      <div class="event-meta">${metaHtml}</div>
      ${vagasHtml}
      ${valorHtml}
      ${publicoHtml}
      ${evt.descricao ? `<div class="event-desc">${eh(evt.descricao)}</div>` : ""}
    </div>

    ${estadoHtml || renderFormHtml(evt)}
  `;

  if (podeInscrever) {
    bindForm(evt);
  }
}

function renderFormHtml(evt) {
  const precisaResponsavel = evt.aceita_criancas || evt.requer_responsavel;
  return `
    <div class="form-card">
      <div class="form-title">Preencha seus dados para se inscrever</div>

      <div class="field">
        <label>Nome Completo<span class="req">*</span></label>
        <input id="f-nome" type="text" placeholder="Seu nome completo" autocomplete="name">
      </div>

      <div class="row2">
        <div class="field">
          <label>WhatsApp<span class="req">*</span></label>
          <input id="f-tel" type="tel" placeholder="(11) 99999-9999" autocomplete="tel">
        </div>
        <div class="field">
          <label>E-mail</label>
          <input id="f-email" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Você é<span class="req">*</span></label>
          <select id="f-tipo" onchange="onTipoChange()">
            <option value="membro">Membro da IPPenha</option>
            <option value="nao_membro">Membro de outra Igreja</option>
            <option value="visitante">Visitante</option>
            ${evt.aceita_criancas ? `<option value="crianca">Criança (até 11 anos)</option>` : ""}
            <option value="adolescente">Adolescente (12–17 anos)</option>
          </select>
        </div>
        <div class="field">
          <label>Congregação / Igreja</label>
          <input id="f-congr" type="text" placeholder="Ex: IPPenha Sede, IPBras...">
        </div>
      </div>

      <div class="resp-sec" id="resp-sec">
        <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding:8px 10px;background:rgba(208,144,64,.08);border-radius:6px;border:1px solid rgba(208,144,64,.2)">
          Menor de idade — dados do responsável
        </div>
        <div class="row2">
          <div class="field">
            <label>Nome do Responsável<span class="req">*</span></label>
            <input id="f-resp-nome" type="text" placeholder="Nome do responsável" autocomplete="off">
          </div>
          <div class="field">
            <label>Tel. do Responsável</label>
            <input id="f-resp-tel" type="tel" placeholder="(11) 99999-9999">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Observações</label>
        <textarea id="f-obs" rows="2" placeholder="Alguma informação adicional? (opcional)"></textarea>
      </div>

      ${!evt.gratuito && evt.valor ? `
      <div style="padding:12px;border-radius:8px;background:rgba(74,156,245,.07);border:1px solid rgba(74,156,245,.18);margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--sky);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Evento Pago</div>
        <div style="font-size:13px;color:var(--tx2)">Valor: <strong style="color:var(--sky)">${fmtMoeda(evt.valor)}</strong> por pessoa. As instruções de pagamento serão enviadas após a inscrição.</div>
      </div>` : ""}

      <div id="form-err" style="display:none;padding:10px 12px;border-radius:7px;background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.2);color:var(--rose);font-size:12.5px;margin-bottom:10px"></div>

      <button class="btn-submit" id="btn-sub" onclick="submitForm()">Confirmar Inscrição</button>

      <div style="font-size:10.5px;color:var(--tx3);text-align:center;margin-top:10px">
        Seus dados serão usados exclusivamente para organização do evento.
      </div>
    </div>
  `;
}

function onTipoChange() {
  const tipo = document.getElementById("f-tipo")?.value;
  const sec  = document.getElementById("resp-sec");
  if (!sec) return;
  if (tipo === "crianca" || tipo === "adolescente") sec.classList.add("show");
  else sec.classList.remove("show");
}

let _submitting = false;
let _eventoAtual = null;

function bindForm(evt) {
  _eventoAtual = evt;
}

async function submitForm() {
  if (_submitting) return;
  const g = id => document.getElementById(id)?.value?.trim() || null;
  const nome  = g("f-nome");
  const tel   = g("f-tel");
  const tipo  = g("f-tipo") || "visitante";
  if (!nome) return showErr("Informe seu nome completo.");
  if (!tel)  return showErr("Informe seu WhatsApp para contato.");
  const tipo_val = tipo;
  if ((tipo_val === "crianca" || tipo_val === "adolescente") && !g("f-resp-nome")) {
    return showErr("Informe o nome do responsável para menores de idade.");
  }
  hideErr();
  _submitting = true;
  const btn = document.getElementById("btn-sub");
  if (btn) { btn.disabled = true; btn.textContent = "Enviando..."; }

  try {
    const hoje = new Date().toISOString().slice(0, 10);
    const evt = _eventoAtual;

    // Revalidar no momento do envio
    if (evt.prazo_inscricao && evt.prazo_inscricao < hoje) {
      return showErr("O prazo de inscrição foi encerrado.");
    }

    if (evt.vagas) {
      const cnt = await sbGet(`evento_inscricoes?evento_id=eq.${evt.id}&select=id&limit=1`);
      // Approximate check — exact enforcement is done DB-side
    }

    const payload = {
      evento_id:            evt.id,
      nome:                 nome,
      email:                g("f-email"),
      telefone:             tel,
      tipo:                 tipo_val,
      responsavel_nome:     g("f-resp-nome"),
      responsavel_telefone: g("f-resp-tel"),
      observacao:           g("f-obs"),
      status:               "pendente",
      pago:                 false,
      valor_cobrado:        (!evt.gratuito && evt.valor) ? Number(evt.valor) : null,
      criado_em:            new Date().toISOString(),
      atualizado_em:        new Date().toISOString(),
    };

    await sbPost("evento_inscricoes", payload);
    renderSucesso(nome, evt);
  } catch (e) {
    let msg = e.message || "Erro ao enviar. Tente novamente.";
    try { const j = JSON.parse(msg); msg = j.message || j.details || msg; } catch (_) {}
    showErr(msg);
    _submitting = false;
    if (btn) { btn.disabled = false; btn.textContent = "Confirmar Inscrição"; }
  }
}

function showErr(msg) {
  const el = document.getElementById("form-err");
  if (!el) return;
  el.textContent = msg;
  el.style.display = "block";
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function hideErr() {
  const el = document.getElementById("form-err");
  if (el) el.style.display = "none";
}

function renderSucesso(nome, evt) {
  app.innerHTML = `
    <div class="event-card" style="margin-bottom:16px">
      <div class="event-title">${eh(evt.titulo)}</div>
      <div class="event-meta">
        ${evt.data_inicio ? `<span>📅 ${fmtD(evt.data_inicio)}${evt.hora_inicio ? " · " + fmtH(evt.hora_inicio) : ""}</span>` : ""}
        ${evt.local_nome  ? `<span>📍 ${eh(evt.local_nome)}</span>` : ""}
      </div>
    </div>

    <div class="success-card">
      <div class="icon">🎉</div>
      <h2>Inscrição realizada!</h2>
      <p style="margin-top:6px">
        <span class="success-name">${eh(nome)}</span>, sua inscrição foi confirmada com sucesso.
        ${!evt.gratuito ? "<br><br>As instruções de pagamento serão enviadas em breve." : ""}
        <br><br>
        Em caso de dúvidas, entre em contato com a igreja.
      </p>
      ${_gerarBotaoWhatsApp(evt, nome)}
    </div>`;
}

function _gerarBotaoWhatsApp(evt, nome) {
  const msg = encodeURIComponent(`Olá! Me inscrevi no evento "${evt.titulo}"${evt.data_inicio ? ` (${fmtD(evt.data_inicio)})` : ""} da IPPenha. Meu nome é ${nome}.`);
  return `<a href="https://wa.me/?text=${msg}" target="_blank" rel="noopener"
    style="display:inline-block;margin-top:18px;padding:10px 22px;border-radius:8px;background:#25d366;color:#fff;font-size:13px;font-weight:700;text-decoration:none">
    Compartilhar no WhatsApp
  </a>`;
}

function renderErro(titulo, msg) {
  app.innerHTML = `
    <div class="state-block">
      <div class="icon">⚠️</div>
      <h2>${eh(titulo)}</h2>
      <p>${eh(msg)}</p>
    </div>`;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SIPEN — Sem conexão</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
  :root {
    --bg:    #181b1e;
    --card:  #212529;
    --bd:    rgba(255,255,255,.08);
    --gr:    #3aaa5c;
    --tx1:   #e4e8ed;
    --tx2:   #a4adb8;
    --tx3:   #7a8490;
    --sans:  system-ui, -apple-system, sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--tx1);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 16px)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 16px);
  }
  .box {
    background: var(--card);
    border: 1px solid var(--bd);
    border-radius: 14px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .icon {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: var(--gr);
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900; color: #fff;
    letter-spacing: -.02em;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px }
  p  { font-size: 13.5px; color: var(--tx2); line-height: 1.6; margin-bottom: 28px }
  .btn {
    display: inline-block;
    background: var(--gr);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    font-family: var(--sans);
    width: 100%;
    transition: opacity .15s;
  }
  .btn:active { opacity: .8 }
  .ver { font-size: 10px; color: var(--tx3); margin-top: 24px }
</style>
</head>
<body>
<div class="box">
  <div class="icon">S</div>
  <h1>Sem conexão</h1>
  <p>O SIPEN precisa de internet para funcionar.<br>
     Verifique sua conexão e tente novamente.</p>
  <button class="btn" onclick="location.reload()">Tentar novamente</button>
  <div class="ver">SIPEN — IPPenha</div>
</div>
</body>
</html>
